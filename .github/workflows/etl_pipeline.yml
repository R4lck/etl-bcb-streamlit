name: Daily ETL Pipeline

on:
  schedule:
    # Roda de segunda a sexta, às 11:00 UTC (equivale a 08:00 em Brasília)
    - cron: '0 11 * * 1-5' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas python-bcb sqlalchemy psycopg2-binary python-dotenv

      - name: Run ETL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python main.py